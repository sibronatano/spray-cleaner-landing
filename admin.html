<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الطلبات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-container {
            max-width: 1000px;
            margin: 5rem auto;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--card-border);
        }
        
        .login-box {
            max-width: 400px;
            margin: 10rem auto;
            text-align: center;
        }

        .orders-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 2rem;
        }

        .orders-table th, .orders-table td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: right;
        }

        .orders-table th {
            background: rgba(0, 242, 254, 0.1);
            color: var(--primary);
            font-weight: 700;
        }

        .text-center { text-align: center !important; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <!-- Login Section -->
    <div id="loginSection" class="login-box">
        <h2 style="margin-bottom: 2rem;">تسجيل الدخول للإدارة</h2>
        <div class="input-group">
            <input type="password" id="adminPassword" placeholder="أدخل الرقم السري">
        </div>
        <button class="btn-primary" style="width: 100%" onclick="login()">دخول</button>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboardSection" class="admin-container hidden">
        <div class="flex-between">
            <h2>📦 قائمة الطلبات</h2>
            <button class="btn-primary" style="padding: 0.5rem 1.5rem; font-size: 1rem;" onclick="location.reload()">تحديث البيانات</button>
        </div>
        
        <table class="orders-table">
            <thead>
                <tr>
                    <th>رقم الطلب</th>
                    <th>الاسم</th>
                    <th>رقم الجوال</th>
                    <th>المدينة</th>
                    <th>الكمية</th>
                    <th>الإجمالي</th>
                    <th>التاريخ</th>
                </tr>
            </thead>
            <tbody id="ordersTableBody">
                <tr><td colspan="7" class="text-center">جاري التحميل...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        function login() {
            const password = document.getElementById('adminPassword').value;
            if (password === 'admin1234') {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboardSection').classList.remove('hidden');
                fetchOrders(password);
            } else {
                alert('الرقم السري خاطئ!');
            }
        }

        async function fetchOrders(password) {
            let orders = [];
            try {
                const res = await fetch(`/api/orders?password=${password}`);
                if (res.ok) {
                    const data = await res.json();
                    orders = data.orders;
                } else {
                    // Fallback to localStorage if API is not available
                    orders = JSON.parse(localStorage.getItem('spray_orders') || '[]');
                }
            } catch (e) {
                // Fallback to localStorage
                orders = JSON.parse(localStorage.getItem('spray_orders') || '[]');
            }
            renderOrders(orders);
        }

        function renderOrders(orders) {
            const tbody = document.getElementById('ordersTableBody');
            tbody.innerHTML = '';
            
            if (orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center">لا توجد طلبات بعد</td></tr>';
                return;
            }

            orders.forEach(order => {
                const tr = document.createElement('tr');
                const date = new Date(order.date).toLocaleString('ar-SA');
                const total = order.totalPrice || (order.quantity * 169);
                tr.innerHTML = `
                    <td>#${order.id.toString().slice(-4)}</td>
                    <td>${order.fullName}</td>
                    <td dir="ltr" style="text-align: right;">${order.phone}</td>
                    <td>${order.city}</td>
                    <td>${order.quantity} عبوات</td>
                    <td style="color: #10b981; font-weight: bold;">${total} ريال</td>
                    <td dir="ltr" style="text-align: right;">${date}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
